version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: akschim-postgres
    environment:
      POSTGRES_DB: akschim
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - akschim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akschim-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/akschim"
      NEXTAUTH_SECRET: "supersecretkey123456789"
      NEXTAUTH_URL: "http://localhost:3000"
      NODE_ENV: "production"
      PRISMA_CLI_BINARY_TARGETS: "debian-openssl-1.1.x"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - akschim-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  akschim-network:
    driver: bridge